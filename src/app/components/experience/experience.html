<section id="experience" class="portfolio-section border-t border-white/8">
  <div class="mx-auto max-w-shell px-5 py-24 sm:px-7">
    <div class="reveal">
      <p class="section-label">Growth Path</p>
      <h2 class="section-title">Experience and Learning</h2>
    </div>

    <div class="timeline mt-16">
      @for (item of experienceItems; track item.company; let index = $index) {
        <article class="timeline-item reveal" [style.transitionDelay.ms]="index * 90">
          <div class="timeline-left">
            <div class="timeline-year">{{ item.year }}</div>
            <div class="timeline-duration">{{ item.duration }}</div>
            <span class="timeline-dot" aria-hidden="true"></span>
          </div>

          <div class="timeline-right">
            <div class="timeline-card">
              <div class="flex flex-wrap items-start justify-between gap-4">
                <div>
                  <h3 class="timeline-company">{{ item.company }}</h3>
                  <p class="timeline-role">{{ item.role }}</p>
                </div>

                @if (item.isCurrent) {
                  <span class="timeline-status">Present</span>
                }
              </div>

              <p class="timeline-description">{{ item.description }}</p>

              <div class="timeline-tag-list">
                @for (tag of item.tags; track tag) {
                  <span class="timeline-tag">{{ tag }}</span>
                }
              </div>
            </div>
          </div>
        </article>
      }
    </div>
  </div>
</section>
