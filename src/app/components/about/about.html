<section id="about" class="portfolio-section border-t border-white/8">
  <div
    class="mx-auto grid max-w-shell gap-16 px-5 py-24 sm:px-7 lg:grid-cols-[minmax(0,420px)_1fr] lg:items-center"
  >
    <div class="reveal">
      <div class="about-frame shadow-cyan-panel">
        <img
          src="images/profile-portrait.svg"
          alt="Stylized developer portrait illustration"
          class="about-frame-image"
        >
        <div class="about-number">05+</div>
      </div>
    </div>

    <div class="reveal">
      <p class="section-label">About Me</p>
      <h2 class="section-title section-title-split">Who<br>I Am.</h2>

      <div class="space-y-5">
        @for (paragraph of paragraphs; track paragraph) {
          <p class="about-copy max-w-[30rem] text-[0.97rem] leading-8 text-portfolio-muted">
            {{ paragraph }}
          </p>
        }
      </div>

      <div class="mt-8 flex flex-wrap gap-3">
        @for (tag of tags; track tag.label) {
          <span class="portfolio-pill">{{ tag.label }}</span>
        }
      </div>

      <div class="mt-10 flex flex-wrap gap-10">
        @for (stat of stats; track stat.label) {
          <div class="about-stat">
            <span class="about-stat-value">{{ stat.value }}</span>
            <span class="about-stat-label">{{ stat.label }}</span>
          </div>
        }
      </div>
    </div>
  </div>
</section>
