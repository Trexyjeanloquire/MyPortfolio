<section id="contact" class="portfolio-section border-t border-white/8">
  <div class="contact-strip mx-auto max-w-shell px-5 py-20 sm:px-7">
    <div class="reveal">
      <p class="section-label">Get in touch</p>
      <h2 class="contact-title">Let's<br><span class="text-portfolio-cyan">Build.</span></h2>
    </div>

    <div class="contact-links reveal">
      @for (link of contactLinks; track link.label) {
        <a
          class="contact-link"
          [href]="link.href"
          [attr.target]="link.external ? '_blank' : null"
          [attr.rel]="link.external ? 'noreferrer' : null"
        >
          <span class="contact-link-label">{{ link.label }}</span>
          <span class="contact-link-value">{{ link.value }}</span>
        </a>
      }

      <div class="pt-4">
        <a href="mailto:hello@yourdev.com" class="button-primary">Send message &#8594;</a>
      </div>
    </div>
  </div>
</section>
