<section id="stack" class="portfolio-section border-t border-white/8">
  <div class="mx-auto max-w-shell px-5 py-24 sm:px-7">
    <div class="reveal">
      <p class="section-label">Tech Stack</p>
      <h2 class="section-title">My Tools</h2>
    </div>

    <div
      class="mt-12 grid gap-px overflow-hidden rounded-[1.5rem] border border-white/10 bg-portfolio-cyan/10 md:grid-cols-2 xl:grid-cols-5"
    >
      @for (item of stackItems; track item.name; let index = $index) {
        <article class="stack-card reveal bg-portfolio-surface" [style.transitionDelay.ms]="index * 80">
          <span class="stack-icon">{{ item.icon }}</span>
          <div>
            <h3 class="stack-name">{{ item.name }}</h3>
            <p class="stack-type">{{ item.type }}</p>
          </div>
          <p class="stack-copy">{{ item.description }}</p>
        </article>
      }
    </div>
  </div>
</section>
